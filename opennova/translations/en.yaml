configuration:
  enable_tls:
    name: Enable TLS
    description: Enable HTTPS on port 443 (required for the official Novabot app)
  ha_mqtt_host:
    name: HA MQTT Host
    description: IP address of your Home Assistant MQTT broker (leave empty to skip HA integration)
  ha_mqtt_port:
    name: HA MQTT Port
    description: Port of your Home Assistant MQTT broker
  ha_mqtt_user:
    name: HA MQTT User
    description: Username for your Home Assistant MQTT broker
  ha_mqtt_pass:
    name: HA MQTT Password
    description: Password for your Home Assistant MQTT broker
